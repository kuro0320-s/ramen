<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おすすめのラーメン屋</title>
    <link rel="stylesheet" href="masanori.css">
</head>

<body>

<header>
    <h1>麺屋 がんてつ</h1>
    <p>高松市で人気のラーメン店</p>
</header>

<main>

    <div class="card">
        <img src="ramen.jpeg" alt="ラーメンの画像">
    </div>

    <div class="card">
        <h2>麺屋 がんてつについて</h2>

        <p>
        高松市で人気のラーメン店「麺屋 がんてつ」。
        濃厚な豚骨スープとコシのある自家製麺が特徴で、
        多くのラーメンファンから支持されています。
        ラーメンだけでなく豊富なサイドメニューも絶品。
        店内は落ち着いた雰囲気で、一人でも家族連れでも気軽に利用できます。
        </p>
    </div>

    <div class="card">
        <h2>営業時間</h2>

        <p>11:00～15:00</p>
        <p>17:00～21:00</p>
        <p>定休日：月曜日</p>
    </div>

    <div class="card">
        <h2>アクセス</h2>

        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d13182.707208620668!2d134.04914515026982!3d34.30777946898472!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3553eaf8cbe4c05d%3A0x31d64ad1708a6dc2!2z6bq65bGLIOOBjOOCk-OBpuOBpA!5e0!3m2!1sja!2sjp!4v1784664643629!5m2!1sja!2sjp"
            width="100%"
            height="450"
            style="border:0;"
            loading="lazy">
        </iframe>

    </div>

</main>

</body>
</html>
